name: Update Arcaea Game Data

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Generate Lua outputs
        id: generate
        run: |
          uv run update.py
          if [ -f .update-skipped ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check wiki auth secret
        if: steps.generate.outputs.updated == 'true'
        id: auth
        env:
          PYWIKIBOT_PASSWORD: ${{ secrets.PYWIKIBOT_PASSWORD_FILE_CONTENT }}
        run: |
          if [ -n "$PYWIKIBOT_PASSWORD" ]; then
            echo "has_password=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write user-password.cfg
        if: steps.generate.outputs.updated == 'true' && steps.auth.outputs.has_password == 'true'
        env:
          PYWIKIBOT_PASSWORD: ${{ secrets.PYWIKIBOT_PASSWORD_FILE_CONTENT }}
        run: |
          echo "$PYWIKIBOT_PASSWORD" > user-password.cfg

      - name: Sync wiki pages
        if: steps.generate.outputs.updated == 'true' && steps.auth.outputs.has_password == 'true'
        run: |
          VERSION=$(cat output/version)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          uv run sync_wiki.py --summary "Bot: Sync data to v$VERSION"

      - name: Commit changes
        if: steps.generate.outputs.updated == 'true'
        uses: EndBug/add-and-commit@v10
        with:
          default_author: github_actions
          message: "chore: update story data"
