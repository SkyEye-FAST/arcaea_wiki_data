name: Update Arcaea Game Data

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update submodule to latest
        run: git submodule update --init --remote --recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Generate Lua outputs
        run: uv run update.py

      - name: Check wiki auth secret
        id: auth
        env:
          PYWIKIBOT_PASSWORD: ${{ secrets.PYWIKIBOT_PASSWORD_FILE_CONTENT }}
        run: |
          if [ -n "$PYWIKIBOT_PASSWORD" ]; then
            echo "has_password=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write user-password.cfg
        if: steps.auth.outputs.has_password == 'true'
        env:
          PYWIKIBOT_PASSWORD: ${{ secrets.PYWIKIBOT_PASSWORD_FILE_CONTENT }}
        run: |
          echo "$PYWIKIBOT_PASSWORD" > user-password.cfg

      - name: Sync wiki pages
        if: steps.auth.outputs.has_password == 'true'
        run: |
          uv run sync_wiki.py --summary "Bot: Sync data"

      - name: Commit changes
        uses: EndBug/add-and-commit@v10
        with:
          default_author: github_actions
          message: "chore: update story data"
