name: Update Arcaea Game Data

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYWIKIBOT_USERNAME: ${{ secrets.PYWIKIBOT_USERNAME }}
      PYWIKIBOT_PASSWORD: ${{ secrets.PYWIKIBOT_PASSWORD }}
      PYWIKIBOT_BOTPASSWORD_SUFFIX: ${{ secrets.PYWIKIBOT_BOTPASSWORD_SUFFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update submodule to latest
        run: git submodule update --init --remote --recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Generate Lua outputs
        run: uv run update.py

      - name: Debug wiki auth inputs
        if: ${{ env.PYWIKIBOT_USERNAME != '' || env.PYWIKIBOT_PASSWORD != '' || env.PYWIKIBOT_BOTPASSWORD_SUFFIX != '' }}
        run: |
          python - <<'PY'
          import os

          username = (os.environ.get("PYWIKIBOT_USERNAME") or "").strip()
          password = (os.environ.get("PYWIKIBOT_PASSWORD") or "").strip()
          suffix = (os.environ.get("PYWIKIBOT_BOTPASSWORD_SUFFIX") or "").strip()

          suffix_no_at = suffix.lstrip("@")
          login_user = username if (not suffix_no_at or "@" in username) else f"{username}@{suffix_no_at}"

          print(f"username_present={bool(username)}")
          print(f"password_present={bool(password)}")
          print(f"suffix_present={bool(suffix)}")
          print(f"suffix_has_leading_at={suffix.startswith('@')}")
          print(f"login_user_has_at={('@' in login_user)}")
          print(f"login_user_length={len(login_user)}")
          PY

      - name: Sync wiki pages
        if: ${{ env.PYWIKIBOT_USERNAME != '' && env.PYWIKIBOT_PASSWORD != '' && env.PYWIKIBOT_BOTPASSWORD_SUFFIX != '' }}
        run: |
          uv run sync_wiki.py --summary "Bot: Sync data"

      - name: Commit changes
        uses: EndBug/add-and-commit@v10
        with:
          default_author: github_actions
          message: "chore: update story data"
