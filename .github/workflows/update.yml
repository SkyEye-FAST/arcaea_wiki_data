name: Update Arcaea Game Data

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYWIKIBOT_PASSWORD_FILE_CONTENT: ${{ secrets.PYWIKIBOT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update submodule to latest
        run: git submodule update --init --remote --recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Generate Lua outputs
        run: uv run update.py

      - name: Debug wiki auth inputs
        if: ${{ env.PYWIKIBOT_PASSWORD_FILE_CONTENT != '' }}
        run: |
          python - <<'PY'
          import os

          password_file_content = os.environ.get("PYWIKIBOT_PASSWORD_FILE_CONTENT") or ""
          login_user = "Masertwer"
          login_source = "fixed-config"

          print(f"password_file_content_present={bool(password_file_content)}")
          print(f"password_file_content_length={len(password_file_content)}")
          print(f"login_source={login_source}")
          print(f"login_user_has_at={('@' in login_user)}")
          print(f"login_user_length={len(login_user)}")
          PY

      - name: Write user-password.cfg
        if: ${{ env.PYWIKIBOT_PASSWORD_FILE_CONTENT != '' }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          content = os.environ["PYWIKIBOT_PASSWORD_FILE_CONTENT"]
          path = Path("user-password.cfg")
          path.write_text(content, encoding="utf-8")
          print(f"wrote {path} ({len(content)} chars)")
          PY

      - name: Sync wiki pages
        if: ${{ env.PYWIKIBOT_PASSWORD_FILE_CONTENT != '' }}
        run: |
          uv run sync_wiki.py --summary "Bot: Sync data"

      - name: Commit changes
        uses: EndBug/add-and-commit@v10
        with:
          default_author: github_actions
          message: "chore: update story data"
